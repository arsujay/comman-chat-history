# Build macOS installers and attach them to a GitHub Release when you push a version tag (e.g. v1.0.1).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Vite + electron-builder)
        run: npm run build:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release artifacts
        run: |
          ls -la release/
          find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' \) ! -name '*.blockmap' | sort

      - name: Create or update GitHub Release with DMG and ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          mapfile -t ASSETS < <(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' \) ! -name '*.blockmap' | sort)
          echo "Found ${#ASSETS[@]} asset(s)"
          for f in "${ASSETS[@]}"; do
            echo " - $f"
          done
          [ "${#ASSETS[@]}" -ge 2 ] || { echo "Expected at least one .dmg and one .zip (excluding blockmaps)"; exit 1; }
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
              --generate-notes \
              --repo "${GITHUB_REPOSITORY}"
          fi
