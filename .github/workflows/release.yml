# Build macOS installers and attach them to a GitHub Release when you push a version tag (e.g. v1.0.0).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Vite + electron-builder)
        run: npm run build:ci
        env:
          # Avoid electron-builder implicit publish / CI quirks
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
